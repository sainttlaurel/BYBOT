services:
  bybots:
    build: .
    container_name: bybots
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/database.db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import os; raise SystemExit(0 if os.path.exists('/app/.bybots.lock') else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  dashboard:
    build: .
    container_name: bybots-dashboard
    restart: unless-stopped
    command: ["python", "dashboard.py"]
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/database.db
      DASHBOARD_HOST: 0.0.0.0
    ports:
      - "${DASHBOARD_PORT:-5000}:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env
    profiles:
      - dashboard
